<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ERENALDO - Cadastro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .register-container {
            background: #FFFFFF;
            border-radius: 16px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .register-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .register-header h1 {
            font-size: 36px;
            font-weight: 700;
            color: #121212;
        }

        .register-header h1 span {
            color: #B71C1C;
        }

        .register-header p {
            color: #757575;
            margin-top: 8px;
            font-size: 14px;
        }

        .register-logo {
            width: 80px;
            height: 80px;
            background: #B71C1C;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 32px;
            font-weight: 700;
            color: #FFFFFF;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #424242;
            font-size: 14px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #E0E0E0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #B71C1C;
            box-shadow: 0 0 0 3px rgba(183, 28, 28, 0.1);
        }

        .form-group input.error {
            border-color: #f44336;
        }

        .btn-register {
            width: 100%;
            padding: 16px;
            background: #B71C1C;
            color: #FFFFFF;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-register:hover {
            background: #8B0000;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(183, 28, 28, 0.3);
        }

        .btn-register:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: transparent;
            color: #B71C1C;
            border: 2px solid #B71C1C;
        }

        .btn-secondary:hover {
            background: #B71C1C;
            color: #FFFFFF;
        }

        .error-message {
            color: #f44336;
            font-size: 13px;
            margin-top: 8px;
            display: none;
            text-align: center;
            background: #FFEBEE;
            padding: 10px;
            border-radius: 8px;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            color: #4CAF50;
            font-size: 13px;
            margin-top: 8px;
            display: none;
            text-align: center;
            background: #E8F5E9;
            padding: 10px;
            border-radius: 8px;
        }

        .success-message.show {
            display: block;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #FFFFFF;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #9E9E9E;
            font-size: 14px;
        }

        .login-link a {
            color: #B71C1C;
            text-decoration: none;
            font-weight: 500;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .register-container {
                padding: 25px;
            }
            .register-header h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <div class="register-logo">E</div>
            <h1>ERENAL<span>DO</span></h1>
            <p>Criar nova conta</p>
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label for="nome">Nome Completo *</label>
                <input type="text" id="nome" placeholder="Seu nome completo" required>
            </div>

            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">Senha *</label>
                <input type="password" id="password" placeholder="Mínimo 6 caracteres" required minlength="6">
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirmar Senha *</label>
                <input type="password" id="confirmPassword" placeholder="Digite a senha novamente" required>
            </div>

            <div class="form-group">
                <label for="perfil">Perfil</label>
                <select id="perfil">
                    <option value="tecnico">Técnico</option>
                    <option value="admin">Administrador</option>
                </select>
            </div>

            <div id="errorMessage" class="error-message">
                <span id="errorText">Erro ao criar conta</span>
            </div>

            <div id="successMessage" class="success-message">
                <span id="successText">Conta criada com sucesso!</span>
            </div>

            <button type="submit" class="btn-register" id="registerBtn">
                Criar Conta
            </button>

            <button type="button" class="btn-register btn-secondary" id="loginRedirectBtn" style="margin-top: 10px;">
                Já tenho conta → Fazer Login
            </button>
        </form>

        <div class="login-link">
            <p>© 2026 ERENALDO - Todos os direitos reservados</p>
        </div>
    </div>

    <script type="module">
        import supabase from './services/supabase.js';

        console.log('🚀 Página de Cadastro carregada');

        const form = document.getElementById('registerForm');
        const nomeInput = document.getElementById('nome');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const perfilSelect = document.getElementById('perfil');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const successMessage = document.getElementById('successMessage');
        const successText = document.getElementById('successText');
        const registerBtn = document.getElementById('registerBtn');
        const loginRedirectBtn = document.getElementById('loginRedirectBtn');

        // Redirecionar para login
        loginRedirectBtn.addEventListener('click', () => {
            window.location.href = '/login.html';
        });

        // ============================================
        // SUBMIT DO FORMULÁRIO
        // ============================================
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Resetar mensagens
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');

            // Coletar dados
            const nome = nomeInput.value.trim();
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            const perfil = perfilSelect.value;

            // Validações
            if (!nome) {
                showError('Informe seu nome completo.');
                return;
            }

            if (!email) {
                showError('Informe seu email.');
                return;
            }

            if (!email.includes('@') || !email.includes('.')) {
                showError('Email inválido. Use um formato válido (exemplo@email.com)');
                return;
            }

            if (password.length < 6) {
                showError('A senha deve ter pelo menos 6 caracteres.');
                return;
            }

            if (password !== confirmPassword) {
                showError('As senhas não coincidem.');
                return;
            }

            // Desabilitar botão
            registerBtn.disabled = true;
            registerBtn.innerHTML = '<span class="loading-spinner"></span> Criando conta...';

            try {
                console.log('📝 Criando usuário:', email);

                // 1. Criar usuário no Auth (com auto-confirmação)
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            nome: nome,
                            perfil: perfil
                        },
                        // IMPORTANTE: Tentar auto-confirmar o email
                        emailRedirectTo: window.location.origin + '/login.html'
                    }
                });

                if (authError) {
                    console.error('❌ Erro ao criar usuário:', authError);
                    
                    // Se o erro for de email confirmado, ainda assim o usuário pode existir
                    if (authError.message.includes('already registered')) {
                        // Tentar fazer login diretamente
                        console.log('📝 Usuário já existe, tentando login...');
                        const { data: loginData, error: loginError } = await supabase.auth.signInWithPassword({
                            email: email,
                            password: password
                        });

                        if (loginError) {
                            throw new Error('Usuário já existe, mas não foi possível fazer login. Tente recuperar a senha.');
                        }

                        // Login bem-sucedido
                        window.location.href = '/login.html';
                        return;
                    }
                    
                    throw new Error(authError.message || 'Erro ao criar conta');
                }

                if (!authData.user) {
                    throw new Error('Erro ao criar usuário');
                }

                console.log('✅ Usuário criado no Auth:', authData.user.id);

                // 2. Criar perfil na tabela usuarios
                try {
                    const { error: profileError } = await supabase
                        .from('usuarios')
                        .upsert([{
                            id: authData.user.id,
                            email: email,
                            nome: nome,
                            perfil: perfil
                        }], { onConflict: 'id' });

                    if (profileError) {
                        console.warn('⚠️ Erro ao criar perfil:', profileError);
                    }
                } catch (profileError) {
                    console.warn('⚠️ Erro ao criar perfil:', profileError);
                }

                console.log('✅ Perfil criado com sucesso!');

                // Sucesso!
                successText.textContent = `Conta criada com sucesso! Bem-vindo(a), ${nome}! Faça login para continuar.`;
                successMessage.classList.add('show');

                // Redirecionar após 2 segundos
                setTimeout(() => {
                    window.location.href = '/login.html';
                }, 2500);

            } catch (error) {
                console.error('❌ Erro:', error);
                showError(error.message || 'Erro ao criar conta. Tente novamente.');
            } finally {
                registerBtn.disabled = false;
                registerBtn.textContent = 'Criar Conta';
            }
        });

        // ============================================
        // FUNÇÕES AUXILIARES
        // ============================================
        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.add('show');
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 5000);
        }

        // Remover erro ao digitar
        [nomeInput, emailInput, passwordInput, confirmPasswordInput].forEach(input => {
            input.addEventListener('input', () => {
                input.classList.remove('error');
                errorMessage.classList.remove('show');
            });
        });

        console.log('✅ Cadastro inicializado');
    </script>
</body>
</html>
