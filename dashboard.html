<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ERENALDO - Dashboard</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <style>
        /* Estilos adicionais para o dashboard */
        .loading-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
            flex-direction: column;
            gap: 16px;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--gray-200);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            color: var(--gray-500);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <a href="dashboard.html" class="logo">ERENAL<span>DO</span></a>
            <div class="user-info">
                <span class="user-name" id="userName">Carregando...</span>
                <div class="user-avatar" id="userAvatar">A</div>
            </div>
        </header>

        <!-- Content -->
        <div id="dashboardContent">
            <!-- Loading inicial -->
            <div id="loadingDashboard" class="loading-container">
                <div class="loading-spinner"></div>
                <span class="loading-text">Carregando dados...</span>
            </div>

            <!-- Conteúdo do Dashboard (inicialmente oculto) -->
            <div id="dashboardData" style="display: none;">
                <div class="stats-grid" id="dashboardStats">
                    <div class="stat-card">
                        <div class="stat-value primary" id="totalClientes">0</div>
                        <div class="stat-label">Clientes</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="totalServicos">0</div>
                        <div class="stat-label">Serviços</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value success" id="totalNotas">0</div>
                        <div class="stat-label">Notas Fiscais</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value warning" id="servicosPendentes">0</div>
                        <div class="stat-label">Pendentes</div>
                    </div>
                </div>

                <div style="margin-top: 16px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                        <h3 style="font-size: 16px; color: var(--gray-700);">📋 Últimos Serviços</h3>
                        <a href="servicos.html" style="font-size: 13px; color: var(--primary); text-decoration: none;">Ver todos →</a>
                    </div>
                    <div id="ultimosServicos">
                        <div class="empty-state" style="padding: 20px;">
                            <p>Nenhum serviço registrado</p>
                        </div>
                    </div>
                </div>

                <div style="margin-top: 16px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                        <h3 style="font-size: 16px; color: var(--gray-700);">📄 Últimas Notas</h3>
                        <a href="notas.html" style="font-size: 13px; color: var(--primary); text-decoration: none;">Ver todas →</a>
                    </div>
                    <div id="ultimasNotas">
                        <div class="empty-state" style="padding: 20px;">
                            <p>Nenhuma nota fiscal registrada</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="dashboard.html" class="active">
                <i data-lucide="home"></i>
                <span>Início</span>
            </a>
            <a href="clientes.html">
                <i data-lucide="users"></i>
                <span>Clientes</span>
            </a>
            <a href="servicos.html">
                <i data-lucide="briefcase"></i>
                <span>Serviços</span>
            </a>
            <a href="notas.html">
                <i data-lucide="file-text"></i>
                <span>Notas</span>
            </a>
        </nav>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module">
        import { AuthService } from './modules/auth.js';
        import { Dashboard } from './modules/dashboard.js';

        console.log('🚀 Inicializando Dashboard...');

        try {
            // Verificar autenticação
            console.log('🔍 Verificando autenticação...');
            const user = await AuthService.checkAuth();
            
            if (user) {
                console.log('✅ Usuário autenticado:', user.nome || user.email);
                document.getElementById('userName').textContent = user.nome || 'Usuário';
                document.getElementById('userAvatar').textContent = (user.nome || 'U').charAt(0).toUpperCase();
                
                // Inicializar ícones
                if (window.lucide) {
                    lucide.createIcons();
                }

                // Inicializar Dashboard
                console.log('📊 Carregando dados do dashboard...');
                const dashboard = new Dashboard();
                
                // Mostrar conteúdo após carregar
                document.getElementById('loadingDashboard').style.display = 'none';
                document.getElementById('dashboardData').style.display = 'block';
            } else {
                console.log('⚠️ Usuário não autenticado');
            }
        } catch (error) {
            console.error('❌ Erro ao inicializar:', error);
            document.getElementById('loadingDashboard').innerHTML = `
                <div style="text-align: center; color: #f44336;">
                    <p>❌ Erro ao carregar o dashboard</p>
                    <p style="font-size: 12px; color: var(--gray-500);">${error.message || 'Erro desconhecido'}</p>
                    <button onclick="window.location.href='/login.html'" class="btn btn-primary" style="margin-top: 16px;">
                        Voltar para o Login
                    </button>
                </div>
            `;
        }
    </script>
</body>
</html>
